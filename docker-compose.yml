services:
  traefik:
    image: traefik:v3.1
    container_name: paroquia-traefik
    restart: always
    environment:
      # O daemon Docker 29+ exige API >= 1.40; sem isto o provider Docker do
      # Traefik fixa a API 1.24 e falha ("client version 1.24 is too old").
      - DOCKER_API_VERSION=1.44
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redireciona todo HTTP para HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (desafio HTTP-01)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - internal

  app:
    build: .
    container_name: paroquia-ai
    restart: always
    environment:
      - NODE_ENV=production
      # Credenciais da conta de serviço Firebase (admin SDK / Firestore server-side)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - VITE_EVOLUTION_API_URL=${VITE_EVOLUTION_API_URL}
      - VITE_EVOLUTION_API_KEY=${VITE_EVOLUTION_API_KEY}
      - VITE_EVOLUTION_INSTANCE_NAME=${VITE_EVOLUTION_INSTANCE_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_DATABASE_ID=${VITE_FIREBASE_DATABASE_ID}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - AI_API_KEY=${AI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - CONTACT_EMAIL_TO=${CONTACT_EMAIL_TO}
    volumes:
      # Conta de serviço Firebase (somente leitura, fora do git)
      - "./service-account.json:/app/service-account.json:ro"
      # Persiste a sessão do WhatsApp (Baileys) e a mídia entre deploys/rebuilds
      - "whatsapp_sessions:/app/instances"
      - "whatsapp_media:/app/dist/media"
    networks:
      - internal
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paroquia.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.paroquia.entrypoints=websecure"
      - "traefik.http.routers.paroquia.tls=true"
      - "traefik.http.routers.paroquia.tls.certresolver=letsencrypt"
      - "traefik.http.services.paroquia.loadbalancer.server.port=3000"

networks:
  internal:
    name: paroquia_internal

volumes:
  whatsapp_sessions:
  whatsapp_media:
  letsencrypt:
