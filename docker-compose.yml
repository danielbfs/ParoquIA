services:
  app:
    build: .
    container_name: paroquia-ai
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_EVOLUTION_API_URL=${VITE_EVOLUTION_API_URL}
      - VITE_EVOLUTION_API_KEY=${VITE_EVOLUTION_API_KEY}
      - VITE_EVOLUTION_INSTANCE_NAME=${VITE_EVOLUTION_INSTANCE_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_DATABASE_ID=${VITE_FIREBASE_DATABASE_ID}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - AI_API_KEY=${AI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - CONTACT_EMAIL_TO=${CONTACT_EMAIL_TO}

    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paroquia.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.paroquia.tls=true"
      - "traefik.http.routers.paroquia.tls.certresolver=letsencrypt"
      - "traefik.http.services.paroquia.loadbalancer.server.url=http://127.0.0.1:3001"

networks:
  internal:
    name: paroquia_internal
