services:
  app:
    build: .
    container_name: paroquia-ai
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_EVOLUTION_API_KEY=${VITE_EVOLUTION_API_KEY}
      - VITE_EVOLUTION_INSTANCE_NAME=${VITE_EVOLUTION_INSTANCE_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_DATABASE_ID=${VITE_FIREBASE_DATABASE_ID}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paroquia.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.paroquia.entrypoints=websecure"
      - "traefik.http.routers.paroquia.tls.certresolver=myresolver"
      - "traefik.http.services.paroquia.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
