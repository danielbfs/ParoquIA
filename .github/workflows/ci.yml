name: CI

# Valida toda mudança antes de chegar a produção: typecheck + build do Vite.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # O código importa firebase-applet-config.json (gitignored, ausente na CI).
      # tsc e o build precisam do arquivo existindo; um stub vazio basta para
      # validar a compilação (os valores reais só entram na imagem de deploy).
      - name: Stub de config do Firebase
        run: 'echo "{}" > firebase-applet-config.json'

      - name: Typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
